<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ノーベル化学賞 一覧</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .table-hover tbody tr:hover { background-color: #e9f0fb; }
    th { white-space: nowrap; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">🏅 ノーベル化学賞</a>
    </div>
  </nav>

  <div class="container my-5">
    <h1 class="mb-4">ノーベル化学賞 受賞一覧</h1>
    <div class="table-responsive">
      <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
          <tr>
            <th>年</th>
            <th>タイトル</th>
            <th>受賞者</th>
            <th>カテゴリ</th>
            <th>DOI</th>
          </tr>
        </thead>
        <tbody>
          {% for entry in nobel_list %}
          <tr>
            <td>{{ entry.year }}</td>
            <td>
              <a href="{{ url_for('detail', year=entry.year) }}">{{ entry.title }}</a>
            </td>
            <td>{{ entry.author }}</td>
            <td><span class="badge bg-secondary">{{ entry.category }}</span></td>
            <td>
              {% if entry.doi %}
              <a href="https://doi.org/{{ entry.doi }}" target="_blank" rel="noopener">{{ entry.doi }}</a>
              {% endif %}
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
